<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pankaj Dangi | Contact</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <style>
        body {
            padding-top: 5px;
            background: #f8f9fa;
        }
        .contact-img {
            max-height: 350px;
            object-fit: cover;
        }
    </style>
</head>

<body class="container-fluid">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg w-full fixed-top-0 left-0 bg-white shadow z-50">
        <div class="container-fluid bg-secondary mx-auto flex items-center justify-between px4 py3 bg-dark">
            <div class="dropdown">
                <img src="image/pklogo.png" class="rounded-circle" height="60"
                     alt="Black and White Portrait of a Man" />
                <span class="text-white">Pankaj Dangi</span>
            </div>
            <div class="align-items-center w-500">
                <button class="navbar-toggler text-bg-light" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon text-bg-light"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link active text-light bg-dark" href="/">Home</a></li>
                        <li class="nav-item"><a class="nav-link active text-light bg-dark" href="about">About</a></li>
                        <li class="nav-item"><a class="nav-link active text-light bg-dark" href="skills">Skills</a></li>
                        <li class="nav-item"><a class="nav-link active text-light bg-dark" href="project">Project</a></li>
                        <li class="nav-item"><a class="nav-link active text-light bg-dark" href="contact">Contact</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- CONTACT SECTION -->
    <section class="py-5 container">
        <div class="container">
            <h1 class="text-center mb-5">
                Contact <span class="text-danger">Me</span>
            </h1>

            <div class="row align-items-center g-4">
                <!-- LEFT SIDE INFO -->
                <div class="col-lg-5">
                    <h3 class="mb-3">Let's <span class="text-danger">Connect</span></h3>
                    <img th:src="@{/image/contactus.jpg}" class="img-fluid rounded-5 shadow mb-3 contact-img">
                    <p><i class="fas fa-home me-3"></i>Zone-1 MP Nagar, Bhopal, India</p>
                    <p><i class="fas fa-envelope me-3"></i>pad88899123@gmail.com</p>
                    <p><i class="fas fa-phone me-3"></i>+91 9039082005</p>
                </div>

                <!-- CONTACT FORM -->
                <div class="col-lg-7">
                    <div class="card shadow rounded-5">
                        <div class="card-body p-4">

                            <!-- Success message -->
                            <div th:if="${successMessage}" class="alert alert-success" role="alert"
                                 th:text="${successMessage}"></div>

                            <!-- Error message -->
                            <div th:if="${errorMessage}" class="alert alert-danger" role="alert"
                                 th:text="${errorMessage}"></div>

                            <form th:action="@{/contact}" method="POST"
                                  style="max-width:500px;margin:0 auto;padding:20px;background:#f9f9f9;
                                         border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,0.1);
                                         font-family:Arial, sans-serif;">

                                <div style="margin-bottom:15px;">
                                    <label for="email" style="display:block;font-weight:600;margin-bottom:6px;color:#333;">
                                        Your Email
                                    </label>
                                    <input type="email" id="email" name="email" required placeholder="name@example.com"
                                           style="width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;
                                                  font-size:14px;box-sizing:border-box;">
                                </div>

                                <div style="margin-bottom:15px;">
                                    <label for="subject" style="display:block;font-weight:600;margin-bottom:6px;color:#333;">
                                        Full Name
                                    </label>
                                    <input type="text" id="subject" name="subject" required placeholder="Your Full Name"
                                           style="width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;
                                                  font-size:14px;box-sizing:border-box;">
                                </div>

                                <div style="margin-bottom:15px;">
                                    <label for="message" style="display:block;font-weight:600;margin-bottom:6px;color:#333;">
                                        Message
                                    </label>
                                    <textarea id="message" name="message" rows="5" required placeholder="Hello Pankaj..."
                                              style="width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;
                                                     font-size:14px;box-sizing:border-box;"></textarea>
                                </div>

                                <button type="submit"
                                        style="width:100%;padding:12px;background:#007BFF;color:#fff;border:none;
                                               border-radius:6px;font-size:16px;font-weight:600;cursor:pointer;
                                               transition:background 0.3s;">
                                    Send Message
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->  

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
